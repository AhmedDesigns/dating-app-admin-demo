<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dating App Admin Panel</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h2 {
            color: #764ba2;
            font-weight: 700;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #764ba2;
            box-shadow: 0 0 0 0.25rem rgba(118, 75, 162, 0.25);
        }
        .btn-login {
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 14px rgba(0, 0, 0, 0.1);
        }
        .alert {
            border-radius: 10px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <i class="fas fa-heart fa-3x mb-3" style="color: #764ba2;"></i>
            <h2>Dating App Admin Panel</h2>
            <p class="text-muted">Admin Login</p>
        </div>
        
        <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control" id="email" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" required>
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-login mb-3" id="loginBtn">
                <span id="loginText">Login</span>
                <span id="loginSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
            </button>
            
            <div class="text-center mt-3">
                <a href="#" class="text-decoration-none" id="forgotPassword">Forgot Password?</a>
            </div>
        </form>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 15px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Reset Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div id="forgotAlert" class="alert d-none"></div>
                    
                    <!-- Step 1: Request Code -->
                    <div id="step1">
                        <p class="text-muted mb-4">Enter your email address and we'll send you a reset code.</p>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="forgotEmail" class="form-control" placeholder="admin@example.com">
                        </div>
                        <button type="button" id="sendCodeBtn" class="btn btn-login">Send Reset Code</button>
                    </div>

                    <!-- Step 2: Reset Password -->
                    <div id="step2" class="d-none">
                        <p class="text-muted mb-4">Enter the code you received and your new password.</p>
                        <div class="mb-3">
                            <label class="form-label">Reset Code</label>
                            <input type="text" id="resetCode" class="form-control" placeholder="6-digit code">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" id="newPassword" class="form-control" placeholder="Min 6 characters">
                        </div>
                        <button type="button" id="resetPassBtn" class="btn btn-login">Update Password</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- JavaScript -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Load auth.js and set up event listeners
        document.addEventListener('DOMContentLoaded', function() {
            // If already logged in, redirect to Dashboard
            if (window.auth.isAuthenticated()) {
                window.location.href = 'dashboard.html';
            }
            
            // Show/hide password
            document.getElementById('togglePassword').addEventListener('click', function() {
                const passwordInput = document.getElementById('password');
                const icon = this.querySelector('i');
                
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    passwordInput.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            });
            
            // Handle login form submission
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                window.auth.login(email, password);
            });

            // Handle Forgot Password Modal
            const forgotModal = new bootstrap.Modal(document.getElementById('forgotPasswordModal'));
            document.getElementById('forgotPassword').addEventListener('click', (e) => {
                e.preventDefault();
                forgotModal.show();
            });

            // Step 1: Send Code
            document.getElementById('sendCodeBtn').addEventListener('click', async () => {
                const email = document.getElementById('forgotEmail').value;
                const alert = document.getElementById('forgotAlert');
                if (!email) return;

                try {
                    const res = await window.api.forgotPassword(email);
                    alert.className = 'alert alert-success';
                    alert.innerHTML = `<b>Success!</b> ${res.message}<br>Code: <b class="fs-4">${res.code}</b>`;
                    alert.classList.remove('d-none');
                    document.getElementById('step1').classList.add('d-none');
                    document.getElementById('step2').classList.remove('d-none');
                } catch (err) {
                    alert.className = 'alert alert-danger';
                    alert.textContent = err.message;
                    alert.classList.remove('d-none');
                }
            });

            // Step 2: Reset Password
            document.getElementById('resetPassBtn').addEventListener('click', async () => {
                const email = document.getElementById('forgotEmail').value;
                const code = document.getElementById('resetCode').value;
                const newPassword = document.getElementById('newPassword').value;
                const alert = document.getElementById('forgotAlert');

                try {
                    await window.api.resetPassword(email, code, newPassword);
                    alert.className = 'alert alert-success';
                    alert.textContent = 'Password updated! You can now login.';
                    alert.classList.remove('d-none');
                    setTimeout(() => forgotModal.hide(), 2000);
                } catch (err) {
                    alert.className = 'alert alert-danger';
                    alert.textContent = err.message;
                    alert.classList.remove('d-none');
                }
            });
        });
    </script>
</body>
</html>
